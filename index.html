                                    <span id="val-shadows">0</span>
                                 </div>
                                 <input type="range" min="-100" max="100" defaultValue="0" id="slider-shadows" onInput={e=>handleFilterDrag('shadows', e.target.value)} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                              </div>

                              <div className="pt-2">
                                 <button onClick={resetFilters} className="w-full py-2 text-[10px] font-black bg-white border border-slate-200 text-slate-500 rounded-lg hover:bg-slate-100 hover:text-slate-700 transition-colors">
                                    필터 초기화
                                 </button>
                              </div>
                           </div>

                           <div className="space-y-4 bg-slate-50 p-4 rounded-2xl">
                              <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block border-b border-slate-200 pb-2">Output Target</label>
                              
                              <div className="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between mb-2">
                                <div className="flex items-center gap-2 text-indigo-600">
                                   <HardDrive size={16}/>
                                   <span className="text-[10px] font-black uppercase">실제 예상 용량</span>
                                </div>
                                <span className="text-sm font-black text-slate-800">
                                  {editorRealSize ? formatBytes(editorRealSize) : <span className="animate-pulse text-slate-400">계산 중...</span>}
                                </span>
                              </div>

                              <div className="pt-1">
                                 <PerformanceSlider 
                                    label="비율 축소" 
                                    min="10" max="100" 
                                    value={editorScaleRatio} 
                                    onCommit={(ratio)=>{
                                       setEditorScaleRatio(ratio);
                                       setEditorDims({
                                          w: originalDims.w * (ratio / 100),
                                          h: originalDims.h * (ratio / 100)
                                       });
                                    }} 
                                    textClass="text-purple-600"
                                    accentClass="accent-purple-600"
                                 />
                              </div>
                              <div className="grid grid-cols-2 gap-3 pt-2">
                                 <div>
                                    <label className="text-[9px] font-black text-slate-400 mb-1 block">가로 맞춤 (PX)</label>
                                    <input type="number" value={Math.round(editorDims.w)} onChange={(e)=>{
                                       const w = Number(e.target.value) || 1;
                                       const ratio = (w / originalDims.w) * 100;
                                       setEditorDims({w, h: w / (originalDims.w / originalDims.h)});
                                       setEditorScaleRatio(Math.round(ratio));
                                    }} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-black shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" />
                                 </div>
                                 <div>
                                    <label className="text-[9px] font-black text-slate-400 mb-1 block">세로 맞춤 (PX)</label>
                                    <input type="number" value={Math.round(editorDims.h)} onChange={(e)=>{
                                       const h = Number(e.target.value) || 1;
                                       const ratio = (h / originalDims.h) * 100;
                                       setEditorDims({h, w: h * (originalDims.w / originalDims.h)});
                                       setEditorScaleRatio(Math.round(ratio));
                                    }} className="w-full p-3 bg-white border border-slate-200 rounded-xl text-xs font-black shadow-sm outline-none focus:ring-2 focus:ring-indigo-500" />
                                 </div>
                              </div>
                              <div className="pt-2">
                                 <PerformanceSlider 
                                    label="압축 품질:" 
                                    min="10" max="100" 
                                    value={editorQuality} 
                                    onCommit={setEditorQuality} 
                                    textClass="text-indigo-600"
                                    accentClass="accent-indigo-600"
                                 />
                              </div>
                           </div>
                        </div>
                        
                        <div className="p-6 bg-white border-t border-slate-100">
                           <button onClick={saveImageEditor} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black flex items-center justify-center gap-2 hover:bg-indigo-700 hover:shadow-xl shadow-indigo-100 hover:-translate-y-1 transition-all active:translate-y-0 uppercase tracking-tighter">
                              <Save size={20}/> 변경사항 적용
                           </button>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
          )}

          {/* Visual Crop Modal */}
          {cropItem && appMode === 'image' && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center bg-slate-900/95 backdrop-blur-md">
                <div className="bg-white rounded-[40px] overflow-hidden shadow-2xl flex flex-col w-11/12 max-w-5xl max-h-[90vh]">
                    <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h3 className="text-2xl font-black text-slate-800 flex items-center gap-2 uppercase tracking-tighter"><Crop className="text-purple-600"/> Visual Crop Tool</h3>
                        <button onClick={() => setCropItem(null)} className="p-2 text-slate-400 hover:text-rose-500 transition-colors"><X size={28} strokeWidth={3}/></button>
                    </div>
                    <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
                        <div className="flex-1 bg-slate-100/50 p-8 flex justify-center items-center relative">
                            <div className="relative inline-block shadow-2xl bg-white ring-1 ring-slate-200">
                                <img src={cropItem.preview} className="max-w-full max-h-[60vh] block" draggable={false} alt="c"/>
                                <div className="absolute top-0 left-0 right-0 bg-slate-900/60 backdrop-blur-[2px]" style={{ height: `${cropMargins.top}%` }} />
                                <div className="absolute bottom-0 left-0 right-0 bg-slate-900/60 backdrop-blur-[2px]" style={{ height: `${cropMargins.bottom}%` }} />
                                <div className="absolute top-0 bottom-0 left-0 bg-slate-900/60 backdrop-blur-[2px]" style={{ width: `${cropMargins.left}%`, top: `${cropMargins.top}%`, bottom: `${cropMargins.bottom}%` }} />
                                <div className="absolute top-0 bottom-0 right-0 bg-slate-900/60 backdrop-blur-[2px]" style={{ width: `${cropMargins.right}%`, top: `${cropMargins.top}%`, bottom: `${cropMargins.bottom}%` }} />
                                <div className="absolute border-2 border-indigo-600 shadow-[0_0_0_1px_rgba(255,255,255,0.5)]" style={{ top: `${cropMargins.top}%`, bottom: `${cropMargins.bottom}%`, left: `${cropMargins.left}%`, right: `${cropMargins.right}%` }} />
                            </div>
                        </div>
                        <div className="w-full md:w-80 bg-white p-8 border-l border-slate-100 flex flex-col">
                            <div className="flex-1 space-y-6">
                                {['top', 'bottom', 'left', 'right'].map(dir => (
                                    <div key={dir} className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <div className="flex justify-between items-center text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">{dir} Margins</div>
                                        <input type="range" min="0" max="45" value={cropMargins[dir]} onChange={(e) => setCropMargins(p => ({...p, [dir]: Number(e.target.value)}))} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                    </div>
                                ))}
                            </div>
                            <div className="pt-8 border-t border-slate-100 grid grid-cols-2 gap-3">
                                <button onClick={() => setCropMargins({top:0,bottom:0,left:0,right:0})} className="py-4 text-sm font-black text-slate-500 bg-slate-100 rounded-2xl">Reset</button>
                                <button onClick={saveCrop} className="py-4 text-sm font-black text-white bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-100">Apply Crop</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          )}

          {/* Simple Viewer */}
          {previewItem && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center bg-black/95 backdrop-blur-md transition-all" onClick={() => setPreviewItem(null)}>
              <div className="absolute top-8 right-8 flex gap-3 z-[120]">
                <div className="bg-black/80 rounded-2xl p-2 flex items-center gap-1 border border-white/20 shadow-2xl" onClick={e => e.stopPropagation()}>
                  <button onClick={() => setZoom(z => Math.max(0.5, z - 0.5))} className="p-3 text-white/50 hover:text-white rounded-xl transition-colors"><ZoomOut size={24}/></button>
                  <div className="flex items-center justify-center px-6 text-white font-black text-lg min-w-[6rem]">{Math.round(zoom * 100)}%</div>
                  <button onClick={() => setZoom(z => Math.min(5, z + 0.5))} className="p-3 text-white/50 hover:text-white rounded-xl transition-colors"><ZoomIn size={24}/></button>
                </div>
                <button onClick={() => setPreviewItem(null)} className="p-4 bg-black border border-white/20 text-white rounded-2xl shadow-xl hover:rotate-90 hover:bg-rose-600 hover:border-rose-600 transition-all"><X size={28} strokeWidth={3}/></button>
              </div>
              <div className="w-full h-full overflow-auto flex items-center justify-center p-10" onClick={() => setPreviewItem(null)}>
                <div className={`transition-transform duration-300 origin-center ${grayscaleMode ? 'grayscale' : ''}`} style={{ transform: `scale(${zoom}) rotate(${previewItem.rotation}deg)` }} onClick={e => e.stopPropagation()}>
                  {previewItem.type === 'blank-page' ? (
                    <div className="w-[595px] h-[842px] bg-white rounded-sm shadow-2xl flex items-center justify-center text-slate-200 font-black text-4xl uppercase">A4 Blank</div>
                  ) : previewItem.preview && (
                    <div className="relative inline-block">
                      <img src={previewItem.preview} className="bg-white object-contain shadow-2xl rounded-sm max-h-[85vh] max-w-[90vw]" draggable={false} alt="p"/>
                      {previewItem.cropData && (
                        <>
                          <div className="absolute top-0 left-0 right-0 bg-white/70 backdrop-blur-[2px]" style={{ height: `${previewItem.cropData.top}%` }} />
                          <div className="absolute bottom-0 left-0 right-0 bg-white/70 backdrop-blur-[2px]" style={{ height: `${previewItem.cropData.bottom}%` }} />
                          <div className="absolute top-0 bottom-0 left-0 bg-white/70 backdrop-blur-[2px]" style={{ width: `${previewItem.cropData.left}%`, top: `${previewItem.cropData.top}%`, bottom: `${previewItem.cropData.bottom}%` }} />
                          <div className="absolute top-0 bottom-0 right-0 bg-white/70 backdrop-blur-[2px]" style={{ width: `${previewItem.cropData.right}%`, top: `${previewItem.cropData.top}%`, bottom: `${previewItem.cropData.bottom}%` }} />
                        </>
                      )}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
